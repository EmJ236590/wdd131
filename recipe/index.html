<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recipe Book</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Delicious recipes for every occasion.">
    <meta property="og:url" content="https://emj236590.github.io/wdd131/recipe/">
    <meta property="og:image" content="images/social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="Delicious recipes for every occasion.">
    <meta name="twitter:image" content="images/social-preview-image.png">

    <!-- Icons -->
    <link rel="icon" href="/recipe/images/dessert.jpg">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>

<body>

<header>
    <div class="logo-container">
        <img src="images/recipe-book-icon.png" alt="Recipe Book Logo">
        <h1>Recipe Book</h1>
    </div>
</header>

<main>

    <form class="search">
        <input type="text" placeholder="Find a recipe">
        <button type="submit">
            <img src="images/search.svg" alt="Search">
        </button>
    </form>

    <article class="recipe-card">

        <img src="images/apple-crisp.jpg" alt="Apple Crisp">

        <div class="recipe-info">

            <p class="tag">Dessert</p>

            <h2>Apple Crisp</h2>

            <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
            >
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">☆</span>
            </span>

            <p class="description">
                A warm and comforting apple crisp topped with a buttery oat crumble.
                Perfect for fall gatherings or a simple family dessert.
            </p>

        </div>

    </article>

</main>

<footer>

    <a href="https://www.flaticon.com/free-icons/recipe"
       title="recipe icons">
       Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>

</footer>

</body>
</html>
