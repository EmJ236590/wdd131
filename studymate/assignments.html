<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Assignments | StudyMate</title>

    <link rel="stylesheet" href="styles.css">

    <script src="assignments.js" defer></script>
    <script src="main.js" defer></script>


</head>


<body>


<header>


    <div class="logo">

        <img src="images/logo.png" alt="StudyMate Logo">

        <h1>StudyMate</h1>

    </div>




    <nav>

        <ul>

            <li>
                <a href="index.html">Home</a>
            </li>


            <li>
                <a href="assignments.html">Assignments</a>
            </li>


            <li>
                <a href="timer.html">Study Timer</a>
            </li>


            <li>
                <a href="progress.html">Progress</a>
            </li>

        </ul>

    </nav>


</header>





<main>


<section class="assignment-page">


    <h2>
        Manage Assignments
    </h2>


    <p>
        Add your assignments below and keep track of upcoming deadlines.
    </p>




    <form id="assignmentForm">


        <label for="assignmentName">
            Assignment Name:
        </label>


        <input 
            type="text" 
            id="assignmentName"
            placeholder="Example: Database Project"
            required
        >




        <label for="course">
            Course:
        </label>


        <input 
            type="text"
            id="course"
            placeholder="Example: WDD131"
            required
        >





        <label for="dueDate">
            Due Date:
        </label>


        <input 
            type="date"
            id="dueDate"
            required
        >




        <button type="submit">
            Add Assignment
        </button>


    </form>



</section>







<section class="assignment-page">


    <h2>
        Upcoming Assignments
    </h2>



    <ul id="assignmentList" class="assignment-list"></ul>


    


    </ul>



</section>





</main>






<footer>

</footer>




</body>

</html>
